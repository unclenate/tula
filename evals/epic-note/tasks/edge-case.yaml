id: edge-case-001
name: Edge Case - Multiple unrelated topics
description: |
  Patient bundles three unrelated questions (refill, lab result, new symptom).
  Skill should NOT cram everything into one message. It should propose
  separate messages or ask the patient which to send first / which is most
  urgent. The correct behavior is splitting, not bundling — so this task
  intentionally does NOT use the portal-format graders.
tags:
  - edge-case
  - multi-topic
inputs:
  prompt: |
    Can you help me write to Dr. Dave Matthews? I need a refill on my metformin, I
    have questions about my recent A1c result, and I also have a new rash on
    my forearm that's been there for four days.
expected:
  output_contains:
    - "separate"
  output_not_contains:
    - "metformin refill, A1c, and rash"
  outcomes:
    - type: task_completed
