name: request-amendment-eval
description: |
  Evaluation suite for the request-amendment skill. Verifies trigger discipline,
  evidence separation, neutral drafting language, HIPAA timeline logic,
  anti-overclaim behavior, PHI boundary compliance, and FHIR draft-only gating.
skill: request-amendment
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.85
    description: Did the skill produce the correct safe outcome for each scenario?
graders:
  - type: code
    name: not_empty
    config:
      assertions:
        - "len(output.strip()) > 0"
tasks:
  - "tasks/*.yaml"
