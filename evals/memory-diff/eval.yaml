name: memory-diff-eval
description: |
  Evaluation suite for the memory-diff skill. Verifies the agent reads
  workspace memory, resolves time windows (default and named-event),
  produces a tiered diff in the documented shape, handles empty windows
  without fabricating, and routes news/PDF/chart prompts to the right
  sibling skills.

  Top-level graders apply to every task. Task-level graders fire only for
  that task — tier-shape graders belong on the happy-path tasks; the
  anti-trigger task intentionally doesn't produce a diff.
skill: memory-diff
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Did the skill produce the correct outcome for this task?
graders:
  - type: code
    name: not_empty
    config:
      assertions:
        - "len(output.strip()) > 0"
tasks:
  - "tasks/*.yaml"
