id: empty-window-001
name: Empty Window - No changes in last hour
description: |
  User asks for a very short window during which no memory entries exist.
  Skill MUST return the one-line "No changes in <window>" message naming
  the most recent entry date — and MUST NOT fabricate any tier entries
  to fill the response.
tags:
  - empty-window
  - edge-case
  - no-fabrication
inputs:
  prompt: |
    What changed in the last hour?
  files:
    - path: MEMORY.md
    - path: memory/2026-04-25.md
    - path: memory/2026-04-30.md
    - path: memory/2026-05-10.md
    - path: memory/2026-05-16.md
expected:
  output_contains:
    - "No changes"
  output_not_contains:
    - "Tier 1"
    - "Tier 2"
  outcomes:
    - type: task_completed
graders:
  - type: text
    name: has_signature_line
    config:
      regex_match:
        - "(?i)Powered by memory-diff"
  - type: text
    name: mentions_last_entry
    config:
      regex_match:
        - "(?i)last entry"
